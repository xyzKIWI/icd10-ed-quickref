<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ICD-10 速查</title>
<style>
  :root{ color-scheme:light; --bg:#f4f7fb; --card:#ffffff; --panel:#eef3f8; --field:#ffffff;
         --line:#c9d5e3; --txt:#142033; --sub:#5d7088; --muted:#7d8fa3;
         --accent:#1769d1; --accent2:#0f7f6e; --code:#8a5200; --hit:#087a47; --warn:#a85b00;
         --header:rgba(244,247,251,.94); --active:#dbeafe; --activeTxt:#0b3b78; --zone:#cbd8e6; --zoneOn:#1769d1;
         --body-line:#6f8298; --body-fill:rgba(255,255,255,.5); }
  :root[data-theme="dark"]{ color-scheme:dark; --bg:#0f1720; --card:#172230; --panel:#141d29; --field:#0b1119;
         --line:#26344a; --txt:#e7eef7; --sub:#8aa0b8; --muted:#5d7088;
         --accent:#4ea1ff; --accent2:#39c6a8; --code:#ffd479; --hit:#7fe0a0; --warn:#ffb86b;
         --header:rgba(15,23,32,.94); --active:#193a5f; --activeTxt:#dceeff; --zone:#2b3d54; --zoneOn:#4ea1ff;
         --body-line:#7f95ad; --body-fill:rgba(255,255,255,.04); }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;background:var(--header);backdrop-filter:blur(14px);
         padding:14px 14px 10px;border-bottom:1px solid var(--line);z-index:5}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  h1{font-size:16px;margin:0 0 8px;color:var(--sub);font-weight:600;letter-spacing:.3px}
  .topbar h1{margin:0;flex:1}
  h1 small{color:var(--muted);font-weight:400}
  .iconbtn{width:36px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--field);
       color:var(--sub);font-size:17px;cursor:pointer}
  .iconbtn:active{transform:translateY(1px)}
  #q{width:100%;font-size:19px;padding:13px 14px;border-radius:12px;border:1px solid var(--line);
     background:var(--field);color:var(--txt);outline:none}
  #q:focus{border-color:var(--accent)}
  .hint{color:var(--sub);font-size:12px;margin:7px 2px 0;line-height:1.5}
  .scope{display:flex;gap:6px;margin-top:9px}
  .scope button{flex:1;padding:7px;border-radius:9px;border:1px solid var(--line);
       background:var(--field);color:var(--sub);font-size:13px;cursor:pointer}
  .scope button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  main{padding:10px 12px 90px;max-width:760px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;
        padding:12px 13px;margin-bottom:10px;cursor:pointer;transition:border-color .1s,background .1s}
  .card:hover{border-color:var(--accent)}
  .card:active{background:var(--panel)}
  .cphint{font-size:10px;color:var(--muted);margin-left:auto}
  .addbtn{font-size:11px;padding:3px 9px;border-radius:7px;border:1px solid var(--line);
        background:var(--field);color:var(--accent);cursor:pointer;font-weight:600}
  .addbtn:active{transform:translateY(1px)}
  .addbtn.added{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  #basket{position:fixed;left:0;right:0;bottom:0;background:var(--header);backdrop-filter:blur(14px);
        border-top:1px solid var(--line);padding:9px 12px;z-index:8;display:none}
  #basket.show{display:block}
  .basket-row{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:8px}
  .basket-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0;max-height:64px;overflow-y:auto}
  .bchip{font-size:12px;padding:4px 8px;border-radius:7px;background:var(--active);color:var(--activeTxt);
        font-family:ui-monospace,monospace;cursor:pointer;white-space:nowrap}
  .bchip .x{margin-left:5px;opacity:.55}
  .basket-btn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;
        padding:8px 11px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap}
  .basket-clear{border:1px solid var(--line);background:var(--field);color:var(--sub);border-radius:8px;
        padding:8px 9px;font-size:12px;cursor:pointer}
  .recent{margin-top:22px}
  .recent-title{font-size:12px;color:var(--sub);text-align:center;margin-bottom:9px}
  .recent-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 8px}
  .rchip{font-size:13px;padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--card);
        color:var(--code);font-family:ui-monospace,monospace;cursor:pointer}
  .kmu{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:12.5px;color:var(--sub);cursor:pointer;user-select:none}
  .kmu input{width:16px;height:16px;accent-color:var(--accent)}
  .kmu b{color:var(--warn)}
  .fbpanel{display:none;margin-top:9px;padding:10px;border:1px solid var(--accent);border-radius:10px;background:var(--panel)}
  .fbpanel.show{display:block}
  .fbpanel textarea{width:100%;font-size:14px;padding:8px;border-radius:8px;border:1px solid var(--line);
        background:var(--field);color:var(--txt);resize:vertical;font-family:inherit}
  .fbrow{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
  .fbsave{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:700;cursor:pointer}
  .fbview,.fbclear{border:1px solid var(--line);background:var(--field);color:var(--sub);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer}
  .fbcount{font-size:12px;color:var(--sub);margin-left:auto}
  .row1{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .code{font-family:ui-monospace,Menlo,monospace;font-size:21px;font-weight:700;color:var(--code);
        letter-spacing:.5px;cursor:pointer}
  .code:active{opacity:.6}
  .copyok{color:var(--hit);font-size:12px;margin-left:4px}
  .en{font-size:15px;margin-top:5px}
  .zh{font-size:16px;color:var(--txt);margin-top:2px}
  .why{font-size:11.5px;color:var(--sub);margin-top:6px}
  .why b{color:var(--hit);font-weight:600}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid var(--line);
        background:var(--field);color:var(--sub);cursor:pointer;font-family:ui-monospace,monospace}
  .chip.on{background:var(--active);border-color:var(--accent);color:var(--activeTxt);font-weight:700}
  .miss{color:var(--warn);font-size:12px;margin-top:7px;line-height:1.45}
  .empty{color:var(--sub);text-align:center;margin-top:40px;font-size:14px;line-height:1.7}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:6px;
       background:var(--panel);color:var(--sub);vertical-align:middle;margin-left:6px}
  .tag.tr{background:var(--active);color:var(--activeTxt)}
  .trauma{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:12px;margin-bottom:12px}
  .trauma.hide{display:none}
  .trauma-open{display:none;width:100%;border:1px solid var(--line);border-radius:10px;background:var(--card);
        color:var(--sub);padding:9px 11px;margin-bottom:10px;font-size:13px;text-align:left;cursor:pointer}
  .trauma-open.show{display:block}
  .trauma-open b{color:var(--accent)}
  .refine{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:10px 11px;margin-bottom:10px}
  .refine.hide{display:none}
  .refine-title{font-size:12.5px;color:var(--sub);margin-bottom:8px}
  .refine-title b{color:var(--txt)}
  .tool-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .tool-title{font-size:14px;font-weight:700;color:var(--txt);flex:1}
  .tool-state{display:block;margin-top:3px;font-size:11.5px;font-weight:400;color:var(--sub)}
  .clearbtn{border:1px solid var(--line);border-radius:9px;background:var(--field);color:var(--sub);padding:7px 10px;font-size:12px;cursor:pointer}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
  .seg button{border:1px solid var(--line);border-radius:9px;background:var(--field);color:var(--sub);padding:7px 10px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--active);border-color:var(--accent);color:var(--activeTxt);font-weight:700}
  .figure-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .figure-pane{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:8px;min-width:0}
  .figure-title{font-size:12px;color:var(--sub);text-align:center;margin-bottom:4px}
  .body-svg{width:100%;height:auto;display:block;max-height:310px;overflow:visible}
  .body-line{fill:var(--body-fill);stroke:var(--body-line);stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .body-detail{fill:none;stroke:var(--body-line);stroke-width:1.1;stroke-linecap:round;opacity:.42;pointer-events:none}
  /* 熱區平時用淡色塊區分各部位(看得到可點區域)；滑過變亮藍、選中填 accent。
     不畫描邊→重疊處不會出現雜亂交叉線。pointer-events:all 確保整塊可 hover */
  .zone{fill:var(--zone);stroke:none;opacity:.30;cursor:pointer;pointer-events:all;
        transition:opacity .12s ease, fill .12s ease;vector-effect:non-scaling-stroke}
  .zone:hover{fill:var(--zoneOn);opacity:.62}
  .zone.on{fill:var(--accent);opacity:.74;stroke:var(--accent);stroke-width:1.5;paint-order:stroke}
  .zone.on:hover{opacity:.82}
  .body-label{font-size:8px;fill:var(--muted)}
  footer{color:var(--muted);font-size:11px;text-align:center;padding:14px}
  .disclaimer{max-width:760px;margin:18px auto 0;padding:12px 14px;font-size:11.5px;line-height:1.7;
        color:var(--sub);background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .disclaimer b{color:var(--warn)}
  .searchbar{position:relative}
  .searchbar #q{padding-right:46px}
  .clearq{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;
        border-radius:8px;border:none;background:var(--panel);color:var(--sub);font-size:15px;
        cursor:pointer;display:none;line-height:1}
  .clearq.show{display:block}
  .clearq:active{transform:translateY(-50%) scale(.92)}
  .tool-title{cursor:pointer}
  .tool-title .caret{font-size:11px;color:var(--accent);margin-left:6px;font-weight:400}
  @media (max-width:560px){
    main{padding-left:10px;padding-right:10px}
    .figure-grid{gap:8px}
    .trauma{padding:10px}
    .seg button{padding:7px 8px}
  }
</style>
</head>
<body>
<header>
  <div class="topbar">
    <h1>ICD-10 速查 <small id="meta"></small></h1>
    <button class="iconbtn" id="fbBtn" type="button" aria-label="回報問題" title="回報搜尋問題">✏️</button>
    <button class="iconbtn" id="themeBtn" type="button" aria-label="切換明暗模式" title="切換明暗模式">☀</button>
  </div>
  <div class="searchbar">
    <input id="q" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="例：contusion left forearm、左前臂挫傷、lt radial fx、頭部撕裂傷">
    <button class="clearq" id="clearQ" type="button" aria-label="清空" title="清空">✕</button>
  </div>
  <div class="scope">
    <button data-s="all" class="on">全部</button>
    <button data-s="inj">外傷</button>
    <button data-s="dx">一般診斷</button>
  </div>
  <div class="fbpanel" id="fbPanel">
    <textarea id="fbText" rows="2" placeholder="這次搜尋哪裡不對？(例：nasal bleeding 找不到 epistaxis)。會自動記下你剛打的關鍵字。"></textarea>
    <div class="fbrow">
      <button class="fbsave" id="fbSave" type="button">記下這筆</button>
      <button class="fbview" id="fbCopy" type="button">複製全部回饋</button>
      <button class="fbclear" id="fbClearAll" type="button">清空</button>
      <span class="fbcount" id="fbCount"></span>
    </div>
  </div>
  <div class="hint">支援英文/中文、縮寫(fx, lac, lt/rt)、拼錯字也能命中。點整個框框即複製代碼。</div>
  <label class="kmu"><input type="checkbox" id="kmuTog"> <span><b>高醫模式</b>：複製時去掉小數點</span></label>
</header>
<main>
  <section class="trauma" aria-label="外傷小人圖">
    <div class="tool-head">
      <div class="tool-title" id="traumaTitle" title="點此收合">外傷小人圖<span class="caret">▲ 收合</span><span class="tool-state" id="traumaState">撕裂傷 · 自動側別</span></div>
      <button class="clearbtn" id="clearTrauma" type="button">清除</button>
    </div>
    <div class="seg" id="injurySeg" aria-label="外傷類型">
      <button type="button" class="on" data-injury="laceration">撕裂傷</button>
      <button type="button" data-injury="contusion">挫傷</button>
      <button type="button" data-injury="fracture">骨折</button>
      <button type="button" data-injury="sprain">扭傷</button>
      <button type="button" data-injury="abrasion">擦傷</button>
      <button type="button" data-injury="burn">燒燙傷</button>
    </div>
    <div class="seg" id="sideSeg" aria-label="側別">
      <button type="button" class="on" data-side-mode="auto">自動</button>
      <button type="button" data-side-mode="none">未指定</button>
      <button type="button" data-side-mode="left">左</button>
      <button type="button" data-side-mode="right">右</button>
      <button type="button" data-side-mode="bilateral">雙側</button>
    </div>
    <div class="figure-grid">
      <div class="figure-pane">
        <div class="figure-title">前面</div>
        <svg class="body-svg" viewBox="0 0 140 260" role="img" aria-label="人體前面">

          <path class="body-detail" d="M55 67 C61 71 79 71 85 67 M50 83 C55 82 59 83 62 86 M90 83 C85 82 81 83 78 86 M52 108 C59 112 81 112 88 108 M58 143 C63 149 67 152 70 152 C73 152 77 149 82 143 M70 176 L70 244 M20 181 C25 179 34 180 39 184 M27 190 L26 202 M32 190 L33 204 M37 188 L40 199 M120 181 C115 179 106 180 101 184 M113 190 L114 202 M108 190 L107 204 M103 188 L100 199 M52 254 L51 258 M57 254 L57 259 M63 254 L64 258 M88 254 L89 258 M83 254 L83 259 M77 254 L76 258"></path>
          <text x="13" y="20" class="body-label">病人右</text><text x="102" y="20" class="body-label">病人左</text>

          <ellipse class="zone" data-part="elbow" data-side="right" cx="27" cy="131" rx="9" ry="9"><title>右肘</title></ellipse>

  <div class="basket-chips" id="basketChips"></div>

  <button class="basket-clear" onclick="clearBasket()">清除</button>

<script>
const DB = /*DATA*/;
const SEVENTH = DB.seventh;
/*CORE*/
function variantZh(e,ch){ return ch ? e.zh+"（"+(SEVENTH[ch]||ch)+"）" : e.zh; }

let IDX=[];
function buildIndex(){
  IDX = DB.entries.map(e=>indexEntry(e,e.k));
}

let SCOPE="all";
let ACTIVE_PREFIXES=null;
function search(q){
  const out=document.getElementById("out");
  const scoped = ACTIVE_PREFIXES && ACTIVE_PREFIXES.length;
  if(!q.trim() && !scoped){out.innerHTML='<div class="empty">輸入診斷關鍵字開始查詢</div>'+recentHtml();return;}
  const qtoks=norm(q);
  const res=searchCore(IDX,q,SCOPE,ACTIVE_PREFIXES);
  if(!res.length){out.innerHTML='<div class="empty">查無結果<br>試試更簡短的關鍵字，或改用英文/中文</div>';return;}
  out.innerHTML=res.map(([sc,item],i)=>card(item,qtoks,i)).join("");
}

function card(item,qtoks,i){
  const e=item.e;
  const chars = e.s7 ? e.s7.split("") : [""];
  const def = chars.includes("A")?"A":chars[0];
  const tag = item.kind==="inj"?'<span class="tag tr">外傷</span>':item.kind==="ext"?'<span class="tag tr">外因</span>':'<span class="tag">診斷</span>';
  const why = whyHit(item,qtoks);
  let chips="";
  if(e.s7 && e.s7.length){
    chips='<div class="chips">'+chars.map(ch=>
      `<span class="chip${ch===def?' on':''}" onclick="event.stopPropagation();pick(${i},'${ch}')">${ch} ${SEVENTH[ch]||''}</span>`
    ).join("")+'</div>';
  }
  const miss = needMore(e) ? `<div class="miss">⚠ ${needMore(e)}</div>` : "";
  return `<div class="card" id="c${i}" data-stem="${e.c}" onclick="cardCopy(${i})">
    <div class="row1"><span class="code" id="code${i}" data-code="${buildCode(e.c,def)}">${buildCode(e.c,def)}</span>${tag}<button class="addbtn" id="add${i}" onclick="event.stopPropagation();addToBasket(${i})">＋ 清單</button><span class="cphint">點框複製</span></div>
    <div class="en">${e.en}</div>
    <div class="zh" id="zh${i}">${variantZh(e,def)}</div>
    ${why?`<div class="why">命中：<b>${why}</b></div>`:""}
    ${chips}${miss}
  </div>`;
}
function pick(i,ch){
  const card=document.getElementById("c"+i); const stem=card.dataset.stem;
  const e=IDX.find(x=>x.e.c===stem&&x.kind)?.e || {c:stem,zh:""};
  const code=buildCode(stem,ch);
  const el=document.getElementById("code"+i);
  el.textContent=code; el.dataset.code=code;
  document.getElementById("zh"+i).textContent=variantZh(e,ch);
  card.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c.textContent.trim().startsWith(ch+" ")||c.textContent.trim()===ch));
}
function fmtCode(c){ return kmuMode ? c.replace(/\./g,"") : c; }   // 高醫模式去小數點
function cardCopy(i){
  const el=document.getElementById("code"+i);
  const out=fmtCode(el.dataset.code);
  navigator.clipboard?.writeText(out);
  pushRecent(el.dataset.code, document.getElementById("zh"+i).textContent);
  const row=el.parentNode;
  let ok=row.querySelector(".copyok");
  if(!ok){ok=document.createElement("span");ok.className="copyok";row.querySelector(".cphint").style.display="none";row.appendChild(ok);}
  ok.textContent="✓ 已複製 "+out;
  clearTimeout(ok._t); ok._t=setTimeout(()=>{ok.remove();const h=row.querySelector(".cphint");if(h)h.style.display="";},1300);
}

// ===== 多碼籃（本次診斷，一鍵複製整段）=====
let basket=[];   // {code, zh}（存原始含點碼，複製時才依高醫模式格式化）
function addToBasket(i){
  const code=document.getElementById("code"+i).dataset.code;
  const zh=document.getElementById("zh"+i).textContent;
  const btn=document.getElementById("add"+i);
  if(basket.some(b=>b.code===code)){ return; }
  basket.push({code,zh});
  if(btn){ btn.classList.add("added"); btn.textContent="✓ 已加入"; }
  renderBasket();
}
function removeBasket(j){ basket.splice(j,1); renderBasket(); }
function clearBasket(){ basket=[]; renderBasket(); document.querySelectorAll(".addbtn.added").forEach(b=>{b.classList.remove("added");b.textContent="＋ 清單";}); }
function renderBasket(){
  const bar=document.getElementById("basket");
  if(!basket.length){ bar.classList.remove("show"); return; }
  bar.classList.add("show");
  document.getElementById("basketChips").innerHTML=basket.map((b,j)=>
    `<span class="bchip" onclick="removeBasket(${j})" title="${b.zh}">${fmtCode(b.code)}<span class="x">✕</span></span>`).join("");
  document.getElementById("basketCopy").textContent="複製全部 ("+basket.length+")";
}
function copyBasket(){
  const text=basket.map(b=>fmtCode(b.code)+"  "+b.zh).join("\n");   // 每行：碼 + 中文，貼病歷用
  navigator.clipboard?.writeText(text);
  const btn=document.getElementById("basketCopy");
  btn.textContent="✓ 已複製 "+basket.length+" 碼";
  clearTimeout(btn._t); btn._t=setTimeout(renderBasket,1300);
}

// ===== 最近使用（localStorage）=====
function pushRecent(code,zh){
  try{
    let r=JSON.parse(localStorage.getItem("recent")||"[]");
    r=r.filter(x=>x.code!==code); r.unshift({code,zh}); r=r.slice(0,12);
    localStorage.setItem("recent",JSON.stringify(r));
  }catch(e){}
}
function recentHtml(){
  let r=[]; try{ r=JSON.parse(localStorage.getItem("recent")||"[]"); }catch(e){}
  if(!r.length) return "";
  return '<div class="recent"><div class="recent-title">最近使用（點即複製）</div><div class="recent-chips">'+
    r.map(x=>`<span class="rchip" onclick="copyRecent(this,'${x.code}')" title="${x.zh}">${fmtCode(x.code)}</span>`).join("")+'</div></div>';
}
function copyRecent(el,code){
  navigator.clipboard?.writeText(fmtCode(code));
  const t=el.textContent; el.textContent="✓ "+fmtCode(code); setTimeout(()=>el.textContent=t,900);
}
// 缺漏欄位提示（規則：骨折/開放傷未指明側別或部位時提醒）
function needMore(e){
  const en=e.en.toLowerCase();
  if(en.includes("unspecified")){
    if(en.includes("fracture")) return "未指明部位/側別，建議補：哪一段、左右、位移、開放或閉鎖";
    return "此為「未明示」碼，若臨床已知側別/部位建議改用更精確碼";
  }
  return "";
}

let theme = "light";
try{ theme = localStorage.getItem("theme") || "light"; }catch(e){}
function applyTheme(){
  document.documentElement.dataset.theme = theme;
  const btn=document.getElementById("themeBtn");
  if(btn) btn.textContent = theme==="dark" ? "☾" : "☀";
}
applyTheme();

// ===== 臨床回饋記錄（存 localStorage，可累積後複製給開發者調整）=====
function fbLoad(){ try{return JSON.parse(localStorage.getItem("fb")||"[]");}catch(e){return [];} }
function fbCountUpdate(){ const n=fbLoad().length; document.getElementById("fbCount").textContent = n?("已記 "+n+" 筆"):""; }
const fbPanel=document.getElementById("fbPanel"), fbText=document.getElementById("fbText");
document.getElementById("fbBtn").onclick=()=>{ fbPanel.classList.toggle("show"); if(fbPanel.classList.contains("show")){fbCountUpdate();fbText.focus();} };
document.getElementById("fbSave").onclick=()=>{
  const note=fbText.value.trim(); const q=document.getElementById("q").value.trim();
  if(!note && !q){ return; }
  const list=fbLoad();
  const d=new Date(); const ts=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  list.push({t:ts, q:q, note:note});
  try{ localStorage.setItem("fb",JSON.stringify(list)); }catch(e){}
  fbText.value=""; fbCountUpdate();
  const b=document.getElementById("fbSave"); b.textContent="✓ 已記下"; setTimeout(()=>b.textContent="記下這筆",1200);
};
document.getElementById("fbCopy").onclick=()=>{
  const list=fbLoad();
  if(!list.length){ alert("還沒有回饋紀錄"); return; }
  const text=list.map(x=>`[${x.t}] 查「${x.q||"-"}」：${x.note||"(無備註)"}`).join("\n");
  navigator.clipboard?.writeText(text);
  const b=document.getElementById("fbCopy"); b.textContent="✓ 已複製"; setTimeout(()=>b.textContent="複製全部回饋",1200);
};
document.getElementById("fbClearAll").onclick=()=>{
  if(!fbLoad().length){ return; }
  if(confirm("確定清空所有回饋紀錄？(複製過了嗎)")){ try{localStorage.removeItem("fb");}catch(e){} fbCountUpdate(); }
};

function setScope(s){
  document.querySelectorAll(".scope button").forEach(x=>x.classList.remove("on"));
  const btn=document.querySelector(`.scope button[data-s="${s}"]`);
  if(btn) btn.classList.add("on");

}

function injuryEntry(prefixes,q){
  return {prefixes:Array.isArray(prefixes)?prefixes:[prefixes],q:q||""};
}
const NO_MATCH_PREFIX="__NO_MATCH__";
function noEntry(q){ return injuryEntry(NO_MATCH_PREFIX,q||""); }
function injuryMap(superficial,openWound,fracture,sprain,q){
  const mk=(prefixes,sortText)=>injuryEntry(prefixes,sortText||q||"");
  return {
    abrasion:mk(superficial),
    contusion:mk(superficial),
    laceration:mk(openWound),
    fracture:mk(fracture),
    sprain:mk(sprain),
  };
}

function setTraumaVisible(show){
  traumaPanel.classList.toggle("hide",!show);
  openTraumaBtn.classList.toggle("show",!show);
}
function hideRefine(){
  activeRefine=null;
  refinePanel.classList.add("hide");
  refineSeg.innerHTML="";
}
function applyQuery(query,prefixes){
  ACTIVE_PREFIXES = prefixes && prefixes.length ? prefixes : null;
  qel.value=query;
  toggleClearBtn();
  setScope("inj");
}
function showFractureRefine(part,side,prefixes){
  const cfg=FRACTURE_REFINES[part];
  if(!cfg) return;
  activeRefine={part,side,prefixes};
  const sideText=side ? SIDE_LABEL[side] : "未指定側別";
  refineTitle.innerHTML=`<b>${cfg.title}</b> · ${sideText}`;
  refineSeg.innerHTML=cfg.opts.map(([term,label,optPrefixes],i)=>`<button type="button" class="${i===0?'on':''}" data-term="${term}" data-prefixes="${(optPrefixes||prefixes||[]).join(",")}">${label}</button>`).join("");
  refinePanel.classList.remove("hide");
  refineSeg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    refineSeg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    const nextPrefixes=b.dataset.prefixes ? b.dataset.prefixes.split(",").filter(Boolean) : prefixes;
    applyQuery(["fracture",side,b.dataset.term].filter(Boolean).join(" "),nextPrefixes);
  });
}
function updateTraumaState(extra){
  const state=document.getElementById("traumaState");
  state.textContent = extra || `${INJURY_LABEL[traumaInjury]} · ${SIDE_LABEL[traumaSideMode]}`;
}
function chooseSeg(container,attr,value){
  document.querySelectorAll(`#${container} button`).forEach(b=>b.classList.toggle("on",b.dataset[attr]===value));
}
document.querySelectorAll("#injurySeg button").forEach(b=>b.onclick=()=>{
  traumaInjury=b.dataset.injury; chooseSeg("injurySeg","injury",traumaInjury); updateTraumaState();
});
document.querySelectorAll("#sideSeg button").forEach(b=>b.onclick=()=>{
  traumaSideMode=b.dataset.sideMode; chooseSeg("sideSeg","sideMode",traumaSideMode); updateTraumaState();
});
document.querySelectorAll(".zone").forEach(z=>z.addEventListener("click",()=>{
  document.querySelectorAll(".zone").forEach(x=>x.classList.remove("on"));
  z.classList.add("on");
  const part=z.dataset.part;
  const autoSide=z.dataset.side || "";
  const side = traumaSideMode==="auto" ? autoSide : traumaSideMode==="none" ? "" : traumaSideMode;
  const cfg=ANATOMICAL_MAP[part] && ANATOMICAL_MAP[part][traumaInjury];
  const prefixes=cfg ? cfg.prefixes : null;
  const sortText=(cfg && cfg.q) || PART_SORT_TEXT[part] || "";
  const query=[traumaInjury,side,sortText].filter(Boolean).join(" ");
  applyQuery(query,prefixes);
  updateTraumaState(`${INJURY_LABEL[traumaInjury]} · ${side ? SIDE_LABEL[side] : "未指定側別"} · ${PART_LABEL[part]}`);
  setTraumaVisible(false);
  hideRefine();
  if(traumaInjury==="fracture" && FRACTURE_REFINES[part]) showFractureRefine(part,side,prefixes);
}));
document.getElementById("clearTrauma").onclick=()=>{
  document.querySelectorAll(".zone").forEach(x=>x.classList.remove("on"));
  qel.value="";
  ACTIVE_PREFIXES=null;
  toggleClearBtn();
  updateTraumaState();
  setTraumaVisible(true);
  hideRefine();
  search("");
};

});
